# =============================================================================
# Logstash 配置文件 - 接收 ceph-exporter 日志
# =============================================================================

input {
  # 接收来自 Filebeat 的日志（方案 2）
  beats {
    port => 5044
    codec => json
  }

  # 接收来自 ceph-exporter 的直接推送（方案 1）
  tcp {
    port => 5044
    codec => json_lines
    tags => ["ceph-exporter-direct"]
  }

  # UDP 输入（可选，用于方案 1 的 UDP 模式）
  # udp {
  #   port => 5044
  #   codec => json_lines
  #   tags => ["ceph-exporter-udp"]
  # }
}

filter {
  # 解析 JSON 日志
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # 添加时间戳
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
      target => "@timestamp"
    }
  }

  # 添加服务标识
  if ![service] {
    mutate {
      add_field => { "service" => "ceph-exporter" }
    }
  }

  # 提取组件信息
  if [component] {
    mutate {
      add_field => { "logger_name" => "%{component}" }
    }
  }

  # 提取追踪 ID（用于关联分布式追踪）
  if [trace_id] {
    mutate {
      add_field => { "trace.id" => "%{trace_id}" }
    }
  }

  # 清理不需要的字段
  mutate {
    remove_field => ["host", "agent", "ecs", "input"]
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ceph-exporter-%{+YYYY.MM.dd}"
    # 如果启用了认证
    # user => "elastic"
    # password => "changeme"
  }

  # 调试输出（可选）
  # stdout {
  #   codec => rubydebug
  # }
}
