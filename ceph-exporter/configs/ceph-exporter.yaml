# =============================================================================
# ceph-exporter Configuration File
# =============================================================================
# This file defines all configuration options for ceph-exporter.
# All configuration options can be overridden by corresponding environment variables.
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP Server Configuration
# Controls the HTTP service behavior exposed by ceph-exporter
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"              # Listen address, default listens on all interfaces
  port: 9128                    # Listen port, port for Prometheus to pull metrics
  read_timeout: 30s             # HTTP read timeout
  write_timeout: 30s            # HTTP write timeout
  tls_cert_file: ""             # TLS certificate file path (leave empty to disable HTTPS)
  tls_key_file: ""              # TLS key file path (leave empty to disable HTTPS)

# -----------------------------------------------------------------------------
# Ceph Cluster Connection Configuration
# Defines how to connect to the Ceph cluster
# Environment variable overrides: CEPH_CONFIG, CEPH_USER, CEPH_KEYRING, CEPH_CLUSTER
# -----------------------------------------------------------------------------
ceph:
  config_file: "/etc/ceph/ceph.conf"                  # Ceph configuration file path
  user: "admin"                                        # Ceph authentication username
  keyring: "/etc/ceph/ceph.client.admin.keyring"       # Keyring authentication file path
  cluster: "ceph"                                      # Ceph cluster name
  timeout: 10s                                         # Command execution timeout

# -----------------------------------------------------------------------------
# Prometheus Collection Configuration
# Controls metric collection frequency and timeout
# -----------------------------------------------------------------------------
prometheus:
  collect_interval: 15s         # Metric collection interval
  timeout: 10s                  # Single collection timeout

# -----------------------------------------------------------------------------
# Logger Configuration
# Supports multiple levels, multiple output targets, log rotation, and ELK integration
# Environment variable overrides: LOG_LEVEL, LOG_FORMAT, LOGSTASH_URL
#
# 日志推送方案切换说明:
#
# 方案 1: 直接推送到 Logstash (Direct Push)
#   - 设置 enable_elk: true
#   - 配置 logstash_url 和 logstash_protocol
#   - 日志会通过 TCP/UDP 直接推送到 Logstash
#   - 优点: 实时推送，无需额外组件
#   - 缺点: 需要网络连接，Logstash 故障会影响日志
#
# 方案 2: 容器日志收集 (Container Log Collection)
#   - 设置 enable_elk: true
#   - 设置 output: "stdout"
#   - 使用 Filebeat/Fluentd 等采集容器标准输出
#   - 优点: 解耦，Logstash 故障不影响应用
#   - 缺点: 需要部署日志收集器
#
# 方案 3: 文件日志收集 (File Log Collection)
#   - 设置 enable_elk: true
#   - 设置 output: "stdout"
#   - 使用 Filebeat 监控日志文件并推送
#   - 优点: 日志持久化，可离线分析
#   - 缺点: 需要管理日志文件和磁盘空间
#
# 推荐配置:
#   - 开发环境: output: "stdout", enable_elk: true (方便查看)
#   - 生产环境(容器): output: "stdout", enable_elk: true + Filebeat sidecar (方案2)
#   - 生产环境(直连): output: "stdout", enable_elk: true (方案1)
# -----------------------------------------------------------------------------
logger:
  level: "info"                 # Log level: trace, debug, info, warn, error, fatal, panic
  format: "json"                # Log format: json (structured), text (plain text)
  output: "stdout"              # Output target: stdout (standard output), stderr (standard error), file (file)
  file_path: "/var/log/ceph-exporter/ceph-exporter.log"  # Log file path (effective when output=file)
  max_size: 100                 # Maximum size of a single log file (MB)
  max_backups: 3                # Number of old log files to retain
  max_age: 28                   # Maximum days to retain log files
  compress: true                # Whether to compress archived old log files

  # ELK Integration (方案 1: 直接推送到 Logstash)
  enable_elk: true             # Whether to enable direct push to Logstash
  logstash_url: "logstash:5000" # Logstash address (host:port)
  logstash_protocol: "tcp"      # Protocol: tcp (reliable, default) or udp (fast)
  service_name: "ceph-exporter" # Service name for log identification in ELK

# -----------------------------------------------------------------------------
# Tracer Configuration (Phase 3 implementation, only configuration structure defined here)
# Implements distributed tracing using OpenTelemetry + Jaeger
# Environment variable overrides: JAEGER_URL, SERVICE_NAME
# -----------------------------------------------------------------------------
tracer:
  enabled: false                                    # Whether to enable tracing (Phase 1 default disabled)
  jaeger_url: "http://jaeger:14268/api/traces"      # Jaeger Collector URL
  service_name: "ceph-exporter"                     # Service name
  sample_rate: 1.0                                  # Sampling rate (0.0-1.0)

# -----------------------------------------------------------------------------
# Plugin Configuration (Phase 5 implementation, only configuration structure defined here)
# Supports monitoring data collection from third-party storage systems
# -----------------------------------------------------------------------------
plugins:
  - name: "example-storage"
    enabled: false
    type: "http"
    path: "http://example-storage:8080"
    config:
      endpoint: "http://example-storage:8080"
      timeout: "10s"
