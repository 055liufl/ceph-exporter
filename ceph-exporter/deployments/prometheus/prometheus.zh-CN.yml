# =============================================================================
# Prometheus 配置文件
# =============================================================================
# 本文件定义 Prometheus 的全局配置、告警规则、告警管理器和采集目标。
#
# 架构说明:
#   Prometheus 定期从 ceph-exporter 的 /metrics 端点拉取指标数据，
#   根据 alert_rules.yml 中定义的规则评估告警条件，
#   触发的告警发送到 Alertmanager 进行分组和通知。
#
# 采集目标:
#   - ceph-exporter:9128/metrics  Ceph 集群指标
#   - localhost:9090/metrics      Prometheus 自身指标
# =============================================================================

# -----------------------------------------------------------------------------
# 全局配置
# -----------------------------------------------------------------------------
global:
  # 默认采集间隔（每 15 秒从目标拉取一次指标）
  scrape_interval: 15s

  # 默认采集超时（单次采集最长等待时间）
  scrape_timeout: 10s

  # 告警规则评估间隔（每 15 秒评估一次告警条件）
  evaluation_interval: 15s

  # 外部标签（附加到所有时序数据和告警上，用于区分不同 Prometheus 实例）
  external_labels:
    cluster: "ceph-monitor"          # 监控集群标识
    environment: "production"        # 环境标识

# -----------------------------------------------------------------------------
# 告警规则文件
# -----------------------------------------------------------------------------
# Prometheus 会加载以下文件中定义的告警规则，并按 evaluation_interval 定期评估
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# -----------------------------------------------------------------------------
# Alertmanager 配置
# -----------------------------------------------------------------------------
# 定义 Prometheus 将告警发送到哪些 Alertmanager 实例
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Alertmanager 地址（使用 Docker 服务名解析）
            - "alertmanager:9093"
      # 发送告警的超时时间
      timeout: 10s

# -----------------------------------------------------------------------------
# 采集目标配置（Scrape Configs）
# -----------------------------------------------------------------------------
scrape_configs:

  # ---------------------------------------------------------------------------
  # ceph-exporter 采集任务
  # ---------------------------------------------------------------------------
  # 从 ceph-exporter 采集 Ceph 集群监控指标
  # 包含: 集群容量、OSD 状态、存储池统计、Monitor 状态、健康检查等
  - job_name: "ceph-exporter"

    # 采集间隔（覆盖全局默认值，Ceph 指标变化较慢，15s 足够）
    scrape_interval: 15s

    # 采集超时（Ceph 命令执行可能较慢，给予充足时间）
    scrape_timeout: 10s

    # 指标路径（默认 /metrics）
    metrics_path: /metrics

    # 静态目标配置
    static_configs:
      - targets:
          # ceph-exporter 服务地址（Docker 服务名:端口）
          - "ceph-exporter:9128"
        # 附加标签（用于在 Grafana 中筛选和分组）
        labels:
          service: "ceph-exporter"
          component: "ceph"

  # ---------------------------------------------------------------------------
  # Prometheus 自身监控
  # ---------------------------------------------------------------------------
  # 采集 Prometheus 自身的运行指标（内存、CPU、采集延迟等）
  # 用于监控 Prometheus 本身的健康状态
  - job_name: "prometheus"

    scrape_interval: 15s

    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"

  # ---------------------------------------------------------------------------
  # Alertmanager 监控
  # ---------------------------------------------------------------------------
  # 采集 Alertmanager 的运行指标
  - job_name: "alertmanager"

    scrape_interval: 30s

    static_configs:
      - targets:
          - "alertmanager:9093"
        labels:
          service: "alertmanager"
