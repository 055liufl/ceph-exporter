# =============================================================================
# Prometheus Configuration File
# =============================================================================
# This file defines Prometheus global configuration, alert rules,
# alertmanager, and scrape targets.
#
# Architecture:
#   Prometheus periodically pulls metric data from ceph-exporter's /metrics endpoint,
#   evaluates alert conditions based on rules defined in alert_rules.yml,
#   and sends triggered alerts to Alertmanager for grouping and notification.
#
# Scrape Targets:
#   - ceph-exporter:9128/metrics  Ceph cluster metrics
#   - localhost:9090/metrics      Prometheus self metrics
# =============================================================================

# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------
global:
  # Default scrape interval (pull metrics from targets every 15 seconds)
  scrape_interval: 15s

  # Default scrape timeout (maximum wait time for a single scrape)
  scrape_timeout: 10s

  # Alert rule evaluation interval (evaluate alert conditions every 15 seconds)
  evaluation_interval: 15s

  # External labels (attached to all time series data and alerts, used to distinguish different Prometheus instances)
  external_labels:
    cluster: "ceph-monitor"          # Monitoring cluster identifier
    environment: "production"        # Environment identifier

# -----------------------------------------------------------------------------
# Alert Rule Files
# -----------------------------------------------------------------------------
# Prometheus will load alert rules defined in the following files and evaluate them periodically according to evaluation_interval
rule_files:
  - "/etc/prometheus/alert_rules.yml"

# -----------------------------------------------------------------------------
# Alertmanager Configuration
# -----------------------------------------------------------------------------
# Define which Alertmanager instances Prometheus should send alerts to
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Alertmanager address (using Docker service name resolution)
            - "alertmanager:9093"
      # Send alert timeout
      timeout: 10s

# -----------------------------------------------------------------------------
# Scrape Configurations
# -----------------------------------------------------------------------------
# Define which targets Prometheus should scrape metrics from
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  # Collect Prometheus's own runtime metrics (memory, CPU, scrape latency, etc.)
  # Used to monitor Prometheus itself
  - job_name: "prometheus"

    scrape_interval: 15s

    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"

  # ---------------------------------------------------------------------------
  # Ceph Exporter monitoring
  # ---------------------------------------------------------------------------
  # Collect Ceph cluster monitoring metrics from ceph-exporter
  # Includes: cluster capacity, OSD status, pool statistics, Monitor status, health checks, etc.
  - job_name: "ceph-exporter"

    # Scrape interval (override global default, Ceph metrics change slowly, 15s is sufficient)
    scrape_interval: 15s

    # Scrape timeout (Ceph commands may be slow, allow sufficient time)
    scrape_timeout: 10s

    # Metrics path (default /metrics)
    metrics_path: /metrics

    # Static target configuration
    static_configs:
      - targets:
          # ceph-exporter service address (Docker service name:port)
          - "ceph-exporter:9128"
        # Additional labels (used for filtering and grouping in Grafana)
        labels:
          service: "ceph-exporter"
          component: "ceph"

  # ---------------------------------------------------------------------------
  # Alertmanager monitoring
  # ---------------------------------------------------------------------------
  # Collect Alertmanager runtime metrics
  - job_name: "alertmanager"

    scrape_interval: 30s

    static_configs:
      - targets:
          - "alertmanager:9093"
        labels:
          service: "alertmanager"

  # ---------------------------------------------------------------------------
  # Grafana monitoring
  # ---------------------------------------------------------------------------
  # Collect Grafana runtime metrics (dashboard count, user count, API performance, etc.)
  # Used to monitor Grafana itself
  - job_name: "grafana"

    scrape_interval: 30s

    scrape_timeout: 10s

    # Grafana metrics endpoint
    metrics_path: /metrics

    static_configs:
      - targets:
          # Grafana service address (Docker service name:port)
          - "grafana:3000"
        labels:
          service: "grafana"
          component: "monitoring"
